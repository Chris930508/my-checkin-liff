<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 打卡系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .loading { color: #888; }
    </style>
</head>
<body>
    <h2 id="status">正在取得位置...</h2>
    <p class="loading">請允許權限以完成打卡</p>

    <script>
        async function main() {
            
            await liff.init({ liffId: "https://liff.line.me/2009668995-lcgnyksh" });

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    // 傳送格式給你的 C# 後端解析
                    liff.sendMessages([{
                        type: 'text',
                        text: `打卡座標:${lat},${lng}`
                    }]).then(() => {
                        alert("位置已傳送！");
                        liff.closeWindow();
                    });
                }, function(err) {
                    document.getElementById('status').innerText = "❌ 抓取失敗，請開啟 GPS";
                }, { enableHighAccuracy: true });
            }
        }
        main();
    </script>
</body>
</html>
